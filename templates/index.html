<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Billing Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #eef2f3; padding-top: 50px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .header-title { color: #2c3e50; font-weight: bold; }
        .btn-primary { background-color: #3498db; border: none; font-weight: bold; }
        .btn-primary:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-5">
                <h2 class="text-center header-title mb-4">Medical Billing Predictor</h2>
                <p class="text-center text-muted">Input Data Pasien untuk Estimasi Tagihan</p>
                <hr>

                <form action="/predict" method="POST">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Age (Usia)</label>
                        <input type="number" name="Age" class="form-control" placeholder="Contoh: 81" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Gender</label>
                        <select name="Gender" class="form-select" required>
                            <option value="" disabled selected>Pilih Gender</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Blood Type</label>
                        <select name="Blood_Type" class="form-select" required>
                            <option value="" disabled selected>Pilih Golongan Darah</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Medical Condition</label>
                        <select name="Medical_Condition" class="form-select" required>
                            <option value="" disabled selected>Pilih Kondisi Medis</option>
                            <option value="Arthritis">Arthritis</option>
                            <option value="Asthma">Asthma</option>
                            <option value="Cancer">Cancer</option>
                            <option value="Diabetes">Diabetes</option>
                            <option value="Hypertension">Hypertension</option>
                            <option value="Obesity">Obesity</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Predict Billing Amount</button>
                </form>

                {% if prediction_text %}
                <div class="mt-4 alert alert-primary text-center">
                    <h5 class="mb-1">Hasil:</h5>
                    <p class="mb-0"><strong>{{ prediction_text }}</strong></p>
                </div>
                {% endif %}

            </div>
            <p class="text-center mt-4 text-secondary">
                <small>Sistem ini menggunakan Model Linear Regression untuk estimasi biaya rumah sakit.</small>
            </p>
        </div>
    </div>
</div>

</body>
</html>
